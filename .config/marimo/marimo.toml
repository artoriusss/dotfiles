[save]
autosave_delay = 1000
format_on_save = false
autosave = "after_delay"

[mcp]
presets = []

[mcp.mcpServers]

[keymap]
destructive_delete = true
preset = "vim"
vimrc = "~/.config/marimo/vimrc"

[keymap.overrides]
"cell.signatureHelp" = "Ctrl-Shift-Process"

[runtime]
default_csv_encoding = "utf-8"
default_auto_download = []
reactive_tests = true
auto_reload = "lazy"
output_max_bytes = 8000000
show_tracebacks = false
watcher_on_save = "lazy"
dotenv = []
on_cell_change = "autorun"
auto_instantiate = false
std_stream_max_bytes = 1000000
default_sql_output = "auto"

[diagnostics]
sql_linter = true

[snippets]
include_default_snippets = true
custom_paths = []

[package_management]
manager = "uv"

[formatting]
line_length = 79

[completion]
signature_hint_on_typing = false
activate_on_typing = true
copilot = false

[server]
follow_symlink = false
browser = "default"

[language_servers.basedpyright]
enabled = true

[language_servers.ty]
enabled = true

[language_servers.pylsp]
enabled = false
enable_pyflakes = false
enable_ruff = true
enable_mypy = true
enable_flake8 = false
enable_pylint = false
enable_pydocstyle = false

[ai]
inline_tooltip = false
rules = ""
mode = "manual"

[ai.custom_providers]

[ai.models]
custom_models = []
displayed_models = []

[display]
custom_css = ["~/.config/marimo/custom.css"]
default_table_page_size = 15
code_editor_font_size = 20
theme = "dark"
reference_highlighting = true
cell_output = "below"
default_width = "full"
dataframes = "rich"
default_table_max_columns = 50

[experimental]
