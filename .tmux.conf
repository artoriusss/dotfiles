# ------------------------------------------------------------
# Core behavior
# ------------------------------------------------------------

set -s escape-time 5
set -g allow-passthrough on
set -g visual-activity off
set -ga terminal-overrides ',xterm*:Tc:Tc'

setw -g mode-keys vi

set-option -g status-position bottom
set-option -g set-clipboard on




# ------------------------------------------------------------
# Window navigation
# ------------------------------------------------------------

# Previous/next window inside current session
bind -n M-n previous-window
bind -n M-o next-window


# ------------------------------------------------------------
# Session navigation (VISIBLE sessions only)
# ------------------------------------------------------------
#
# Hidden/background sessions start with `_` like:
#   _servers
#   _training
#   _docker
#
# Hidden sessions are excluded from normal cycling.

# Visible session cycling
bind -n M-c run-shell "~/.tmux/scripts/next-session"
bind -n M-C run-shell "~/.tmux/scripts/prev-session"

# Hidden sessions
bind -n M-h choose-tree -sZ "_*"

bind -n M-m if-shell '[ "#{session_name}" = "_monitor" ]' \
    'switch-client -l' \
    'if-shell "tmux has-session -t _monitor 2>/dev/null" "switch-client -t _monitor"'

bind -n M-s if-shell '[ "#{session_name}" = "_services" ]' \
    'switch-client -l' \
    'if-shell "tmux has-session -t _monitor 2>/dev/null" "switch-client -t _services"'

# All sessions
bind -n M-a choose-tree -sZ


# ------------------------------------------------------------
# Copy mode
# ------------------------------------------------------------

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# Prevent accidental session kills
bind X confirm-before -p "Kill session #S? (y/n)" kill-session


# ------------------------------------------------------------
# Optional daemon session bootstrap
# ------------------------------------------------------------

# Auto-create hidden infra session if missing
if-shell 'tmux has-session -t _services 2>/dev/null' '' \
    'new-session -d -s _services'


# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'vaaleyard/tmux-dotbar'

set -g @tmux-dotbar-bg "#1c0c28"
set -g @tmux-dotbar-fg-current "#ffffff"


# ------------------------------------------------------------
# Local vs remote coloring
# ------------------------------------------------------------

# Local = lime
# SSH   = red

if-shell '[ -n "$SSH_CONNECTION" ]' \
  "set -g @tmux-dotbar-fg-session '#ff6666'" \
  "set -g @tmux-dotbar-fg-session '#c6e960'"


# ------------------------------------------------------------
# TPM init (must stay at bottom)
# ------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'
